<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>flow test</title></head>
<body>
<div class="shell">
  <header class="site-header" id="site-header"></header>
  <div class="view" id="view"></div>
  <footer class="site-footer" id="site-footer"></footer>
</div>
<script>localStorage.clear(); history.replaceState({}, '', '/');</script>
<script src="/js/data.js"></script>
<script src="/js/store.js"></script>
<script src="/js/app.js"></script>
<script>
(function () {
  const results = [];
  function check(name, cond) { results.push((cond ? 'PASS' : 'FAIL') + ' ' + name); }
  function click(sel) {
    const el = document.querySelector(sel);
    if (!el) { results.push('FAIL missing element: ' + sel); return false; }
    el.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    return true;
  }
  function input(sel, value) {
    const el = document.querySelector(sel);
    if (!el) { results.push('FAIL missing input: ' + sel); return false; }
    el.value = value;
    el.dispatchEvent(new Event('input', { bubbles: true }));
    return true;
  }

  try {
    // 1. home → planner
    check('home hero', !!document.querySelector('.hero h1'));
    click('a[href="/plan"][data-nav]');
    check('planner route', location.pathname === '/plan');
    check('planner 12 tokyo spots', document.querySelectorAll('.spot-card').length === 12);
    check('cta disabled when none selected', document.querySelector('[data-act="go-info"]').disabled === true);

    // 2. select two spots + one from a sub region
    click('.spot-card:nth-child(1) .sp-body');
    click('.spot-card:nth-child(3) .sp-body');
    check('order badges', document.querySelectorAll('.sp-order').length === 2);
    click('[data-act="pick-region"][data-region="kansai"]');
    check('kansai spots', document.querySelectorAll('.spot-card').length === 6);
    click('.spot-card:nth-child(1) .sp-body');
    check('3 chips', document.querySelectorAll('.sel-chip').length === 3);
    check('region count badge', !!document.querySelector('.region-tile .rt-count'));

    // chip removal
    click('.sel-chip:nth-child(3)');
    check('chip removed', document.querySelectorAll('.sel-chip').length === 2);

    // 3. info step
    click('[data-act="go-info"]');
    check('info route', location.pathname === '/plan/info');
    check('next disabled without date', document.getElementById('info-next').disabled === true);
    input('[data-form="date"]', '2026-08-15');
    check('next enabled with date', document.getElementById('info-next').disabled === false);
    input('[data-form="lodging"]', '신주쿠 인근');
    input('[data-form="notes"]', '아이 동반, 라멘 투어 희망');

    // 4. pay requires login → redirected to /login
    click('[data-act="go-pay"]');
    check('redirect to login', location.pathname === '/login');
    input('[data-login="email"]', 'tester@example.com');
    check('send enabled', document.getElementById('send-code').disabled === false);
    click('[data-act="send-code"]');
    const code = document.querySelector('.demo-code b').textContent.trim();
    check('demo code 6 digits', /^\d{6}$/.test(code));
    input('[data-login="code"]', '000000');
    click('[data-act="verify-code"]');
    check('wrong code error shown', document.getElementById('login-err').hidden === false);
    input('[data-login="code"]', code);
    click('[data-act="verify-code"]');
    check('back to pay after login', location.pathname === '/plan/pay');

    // 5. payment
    check('summary has spots', document.querySelector('.ps-row span:last-child').textContent.indexOf('시부야') >= 0);
    check('pay disabled (card empty)', document.getElementById('pay-btn').disabled === true);
    input('[data-card="num"]', '4111111111111111');
    check('card formatted', document.querySelector('[data-card="num"]').value === '4111 1111 1111 1111');
    input('[data-card="exp"]', '1227');
    check('exp formatted', document.querySelector('[data-card="exp"]').value === '12/27');
    input('[data-card="cvc"]', '123');
    check('pay enabled', document.getElementById('pay-btn').disabled === false);
    click('[data-act="pick-method"][data-method="kakao"]');
    check('easy note shown', !!document.querySelector('.easy-note'));
    click('[data-act="pick-method"][data-method="card"]');
    check('card fields kept', document.querySelector('[data-card="num"]').value === '4111 1111 1111 1111');
    click('[data-act="do-pay"]');
    check('done route', location.pathname === '/plan/done');
    check('RECEIVED shown', document.querySelector('.dn-en').textContent === 'RECEIVED');

    // 6. mypage shows request in progress
    click('a[data-nav-my]');
    check('mypage route', location.pathname === '/my');
    check('request card', document.querySelectorAll('.req-card').length === 1);
    check('status writing', document.querySelector('.status-badge').textContent === '가이드 작성 중');

    // 7. admin registers a guide
    click('[data-act="go-admin"]');
    check('admin route', location.pathname === '/admin');
    click('.admin-req');
    input('[data-admin="title"]', '도쿄 3박 4일 코스');
    input('[data-admin="body"]', 'Day 1 — 시부야\nDay 2 — 아사쿠사');
    check('register enabled', document.getElementById('register-guide').disabled === false);
    click('[data-act="register-guide"]');
    check('guide saved (read-only view)', !!document.querySelector('.ad-guide-done'));

    // 8. notification badge + open guide
    check('unread badge = 1', document.querySelector('.notif-badge').textContent === '1');
    click('[data-act="toggle-notif"]');
    check('notif panel open', !!document.querySelector('.notif-panel'));
    click('.notif-item');
    check('guide route', /^\/guide\/R-\d{6}$/.test(location.pathname));
    check('guide title', document.querySelector('.section-title .st-ko').textContent === '도쿄 3박 4일 코스');
    check('guide body pre-wrap', document.querySelector('.guide-body').textContent.indexOf('Day 2') >= 0);
    check('badge cleared', !document.querySelector('.notif-badge'));

    // 9. mypage now shows arrived + persistence survives reload of store
    click('[data-act="go-my"]');
    check('status arrived', document.querySelector('.status-badge').textContent === '가이드 도착');
    check('guide button', !!document.querySelector('a.btn-square'));
    const saved = JSON.parse(localStorage.getItem('mtm_proto_v1'));
    check('persisted request+guide', saved.requests.length === 1 && !!saved.requests[0].guide);
    check('persisted user', saved.user.email === 'tester@example.com');

    // 10. logout
    click('[data-act="logout"]');
    check('logged out home', location.pathname === '/' && !!document.querySelector('a[href="/login"]'));
  } catch (e) {
    results.push('FAIL exception: ' + (e && e.message));
  }

  const pre = document.createElement('pre');
  pre.id = 'test-results';
  pre.textContent = results.join('\n');
  document.body.appendChild(pre);
})();
</script>
</body>
</html>
