<!DOCTYPE html>
<html lang="ko">
<head><meta charset="utf-8"><title>flow test</title></head>
<body>
<div class="shell">
  <header class="site-header" id="site-header"></header>
  <div class="view" id="view"></div>
  <footer class="site-footer" id="site-footer"></footer>
</div>
<script>localStorage.clear(); history.replaceState({}, '', '/');</script>
<script src="/js/data.js"></script>
<script src="/js/store.js"></script>
<script src="/js/app.js"></script>
<script>
(function () {
  const results = [];
  function check(name, cond) { results.push((cond ? 'PASS' : 'FAIL') + ' ' + name); }
  function click(sel) {
    const el = document.querySelector(sel);
    if (!el) { results.push('FAIL missing element: ' + sel); return false; }
    el.dispatchEvent(new MouseEvent('click', { bubbles: true, cancelable: true }));
    return true;
  }
  function input(sel, value) {
    const el = document.querySelector(sel);
    if (!el) { results.push('FAIL missing input: ' + sel); return false; }
    el.value = value;
    el.dispatchEvent(new Event('input', { bubbles: true }));
    return true;
  }

  try {
    // 1. home → planner
    check('home hero', !!document.querySelector('.hero h1'));
    click('a[href="/plan"][data-nav]');
    check('planner route', location.pathname === '/plan');
    check('planner 12 tokyo spots', document.querySelectorAll('.spot-card').length === 12);
    check('cta disabled when none selected', document.querySelector('[data-act="go-info"]').disabled === true);

    // 2. select two spots + one from a sub region
    click('.spot-card:nth-child(1) .sp-img img');
    click('.spot-card:nth-child(3)');
    check('order badges', document.querySelectorAll('.sp-order').length === 2);
    click('[data-act="pick-region"][data-region="kansai"]');
    check('kansai spots', document.querySelectorAll('.spot-card').length === 6);
    click('.spot-card:nth-child(1) .sp-img img');
    check('3 chips', document.querySelectorAll('.sel-chip').length === 3);
    check('region count badge', !!document.querySelector('.region-tile .rt-count'));

    // chip removal
    click('.sel-chip:nth-child(3)');
    check('chip removed', document.querySelectorAll('.sel-chip').length === 2);

    // 3. info step
    click('[data-act="go-info"]');
    check('info route', location.pathname === '/plan/info');
    check('next disabled without phone/date', document.getElementById('info-next').disabled === true);
    input('[data-form="phone"]', '01012345678');
    input('[data-form="date"]', '2026-08-15');
    check('next enabled with phone/date', document.getElementById('info-next').disabled === false);
    input('[data-form="lodging"]', '신주쿠 인근');
    input('[data-form="notes"]', '아이 동반, 라멘 투어 희망');

    // 4. pay requires login; signup and login entry points exist
    click('[data-act="go-pay"]');
    check('redirect to login', location.pathname === '/login');
    check('email code login form', !!document.querySelector('[data-auth="email"]') && !document.querySelector('[data-auth="password"]'));
    click('a[href="/signup"][data-nav]');
    check('signup route', location.pathname === '/signup');
    check('signup name and email fields', document.querySelectorAll('[data-auth]').length === 2);

    // Functions authentication is covered by test/auth-test.mjs. Seed only the
    // in-memory user here so the remaining static UI flow can be exercised.
    window.MTM_STORE.store.user = { email: 'tester@example.com', name: '테스터' };
    history.replaceState({}, '', '/plan/pay');
    dispatchEvent(new PopStateEvent('popstate'));
    check('authenticated pay route', location.pathname === '/plan/pay');

    // 5. payment form UI (D1 submission is covered by API integration tests)
    check('summary has spots', document.querySelector('.ps-row span:last-child').textContent.indexOf('시부야') >= 0);
    check('pay enabled with phone', document.getElementById('pay-btn').disabled === false);
    click('[data-act="pick-method"][data-method="kakao"]');
    check('payapp note shown', document.querySelector('.easy-note').textContent.indexOf('페이앱') >= 0);
    click('[data-act="pick-method"][data-method="card"]');
    check('card data not collected locally', !document.querySelector('[data-card="num"]'));
    check('D1 submit action present', document.getElementById('pay-btn').getAttribute('data-act') === 'do-pay');
    check('no local prototype store', !localStorage.getItem('mtm_proto_v1'));
  } catch (e) {
    results.push('FAIL exception: ' + (e && e.message));
  }

  const pre = document.createElement('pre');
  pre.id = 'test-results';
  pre.textContent = results.join('\n');
  document.body.appendChild(pre);
})();
</script>
</body>
</html>
